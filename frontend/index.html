<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Planning Poker — Lobby</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/poker.css">
    <style>
      /* Lobby-specific layout */
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 15vh;
      }

      main { width: 100%; max-width: 440px; }

      #recent-list { display: flex; gap: 8px; flex-wrap: wrap; }
    </style>
  </head>
  <body>
    <main>
      <div class="logo-area">
        <div class="logo-pip">
          <div class="pip-icon">♠</div>
        </div>
        <h1>Planning <em>Poker</em></h1>
        <p class="tagline">Estimate stories together, in real time</p>
      </div>

      <div class="card">
        <label class="field-label" for="name">Your name</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="name" placeholder="e.g. Alex" autocomplete="off" />
        </div>

        <div class="divider">then</div>

        <button class="btn btn-primary btn-full" id="create">
          <span>♠</span> Create a room
        </button>

        <div class="divider">or join existing</div>

        <div class="join-row">
          <div class="input-wrap" style="flex:1">
            <span class="input-icon text-mono" style="font-size:13px">#</span>
            <input type="text" id="room" placeholder="ROOM CODE" maxlength="8" autocomplete="off" />
          </div>
          <button class="btn btn-secondary" id="join">Join →</button>
        </div>

        <div class="recent-section" id="recent-rooms">
          <div class="recent-label">Recent rooms</div>
          <div id="recent-list"></div>
        </div>
      </div>
    </main>

    <footer>No account needed &middot; Rooms expire when empty</footer>

    <script>
      try {
        document.addEventListener('DOMContentLoaded', () => {
          const last = localStorage.getItem('planning_pal.lastName') || ''
          const el = document.getElementById('name')
          if (el && last) el.value = last
        })
      } catch(e) {}

      function randRoom() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'
        let s = ''
        for (let i = 0; i < 6; i++) s += chars[Math.floor(Math.random() * chars.length)]
        return s
      }

      function saveRecent(room) {
        try {
          const key = 'planning_pal.recent'
          const arr = JSON.parse(localStorage.getItem(key) || '[]')
          const idx = arr.indexOf(room)
          if (idx !== -1) arr.splice(idx, 1)
          arr.unshift(room)
          localStorage.setItem(key, JSON.stringify(arr.slice(0, 3)))
        } catch(e) {}
      }

      function getName() {
        const v = document.getElementById('name').value.trim()
        try { localStorage.setItem('planning_pal.lastName', v) } catch(e) {}
        return encodeURIComponent(v || 'Player')
      }

      function renderRecent() {
        try {
          const arr = JSON.parse(localStorage.getItem('planning_pal.recent') || '[]')
          const el = document.getElementById('recent-list')
          el.innerHTML = ''
          if (!arr.length) {
            el.innerHTML = '<span class="no-content">No recent rooms yet</span>'
            return
          }
          arr.forEach(r => {
            const b = document.createElement('button')
            b.className = 'recent-chip'
            b.innerHTML = `<span>↩</span>${r}`
            b.addEventListener('click', () => {
              location.href = `/room/${encodeURIComponent(r)}?name=${getName()}`
            })
            el.appendChild(b)
          })
        } catch(e) {}
      }

      document.addEventListener('DOMContentLoaded', renderRecent)

      document.getElementById('create').addEventListener('click', async () => {
        const name = getName()
        const room = randRoom()
        saveRecent(room)
        location.href = `/room/${room}?name=${name}`
      })

      document.getElementById('join').addEventListener('click', () => {
        const room = document.getElementById('room').value.trim().toUpperCase()
        if (!room) { document.getElementById('room').focus(); return }
        saveRecent(room)
        location.href = `/room/${encodeURIComponent(room)}?name=${getName()}`
      })

      document.getElementById('room').addEventListener('input', function() {
        const pos = this.selectionStart
        this.value = this.value.toUpperCase()
        this.setSelectionRange(pos, pos)
      })

      document.getElementById('room').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('join').click()
      })

      renderRecent()

      const error = new URLSearchParams(location.search).get('error')
      const errorName = new URLSearchParams(location.search).get('name')
      if (error === 'name_taken') {
        const msg = document.createElement('div')
        msg.style.cssText = 'margin-bottom:16px;padding:10px 14px;border-radius:8px;background:#fef2f2;border:1px solid rgba(185,28,28,0.15);color:#b91c1c;font-size:13px;font-weight:500'
        msg.textContent = `"${errorName}" is already taken in that room. Please choose a different name.`
        document.querySelector('.card').prepend(msg)
      }
    </script>
  </body>
</html>
