<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ac0d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ac0e8;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect x="1" y="1" width="30" height="30" rx="5" ry="5" fill="url(#cardGrad)" />

  <!-- Shine overlay -->
  <rect x="1" y="1" width="30" height="30" rx="5" ry="5" fill="url(#shineGrad)" />

  <!-- "♠" text -->
  <text x="50%" y="58%" dominant-baseline="middle" text-anchor="middle" font-family="'Instrument Sans', system-ui, sans-serif" font-size="24" fill="#ffffff">♠</text>
</svg>
