<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Planning Poker — Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/poker.css">
    <style>
      /* ── Room page layout ─────────────────────────────────── */
      body { max-width: 900px; margin: 0 auto; }

      /* ── Top bar ──────────────────────────────────────────── */
      .topbar {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding-bottom: 20px;
        margin-bottom: 24px;
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
      }

      .topbar-left {
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }

      .room-brand {
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
      }

      .room-brand .pip-icon { flex-shrink: 0; }

      #roomcode {
        font-family: var(--mono);
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.1em;
        color: var(--ink-muted);
        background: var(--accent-pale);
        border: 1px solid rgba(212,98,42,0.15);
        border-radius: 6px;
        padding: 4px 10px;
      }

      #status {
        font-size: 12px;
        color: #b84040;
        font-weight: 500;
      }

      /* ── Story bar ────────────────────────────────────────── */
      .story-bar {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px 18px;
        margin-bottom: 24px;
        box-shadow: 0 1px 3px rgba(26,23,20,0.04);
      }

      .story-label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-faint);
        flex-shrink: 0;
      }

      #story {
        flex: 1;
        font-family: var(--sans);
        font-size: 15px;
        font-weight: 600;
        color: var(--ink);
        min-width: 0;
        outline: none;
        border-radius: 6px;
        padding: 2px 4px;
        transition: background 0.15s, box-shadow 0.15s;
      }

      #story[contenteditable="true"] {
        background: #fffbe6;
        box-shadow: 0 0 0 2px #ffd54d;
        padding: 4px 8px;
      }

      #story-controls {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }

      /* ── Participants grid ────────────────────────────────── */
      #participants {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 12px;
        margin-bottom: 28px;
      }

      .p-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px 12px 14px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        transition: transform 0.15s, box-shadow 0.15s;
        box-shadow: 0 1px 3px rgba(26,23,20,0.04);
        position: relative;
        overflow: visible;
      }

      .p-card.is-you {
        border-color: rgba(212,98,42,0.25);
        background: #fdfaf8;
      }

      .p-vote {
        font-family: var(--mono);
        font-size: 26px;
        font-weight: 500;
        color: var(--ink);
        min-height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .p-vote.waiting {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: var(--bg);
        border: 1.5px dashed var(--border);
        font-size: 0; /* hide text */
      }

      .p-vote.voted-hidden {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: var(--accent);
        position: relative;
        font-size: 0;
      }

      .p-vote.voted-hidden::after {
        content: '✓';
        font-size: 16px;
        color: #fff;
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--sans);
      }

      .p-name {
        font-size: 12px;
        font-weight: 600;
        color: var(--ink-muted);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
      }

      .p-name.is-you::after {
        content: ' (you)';
        color: var(--ink-faint);
        font-weight: 400;
      }

      /* ── Voting deck ──────────────────────────────────────── */
      .deck-section {
        position: relative;
        z-index: 1;
        margin-bottom: 24px;
      }

      .section-label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-faint);
        margin-bottom: 10px;
      }

      #deck {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .deck-card {
        font-family: var(--mono);
        font-size: 15px;
        font-weight: 500;
        padding: 10px 0;
        width: 52px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--ink);
        cursor: pointer;
        transition: background 0.12s, border-color 0.12s, transform 0.1s, box-shadow 0.1s;
        text-align: center;
      }

      .deck-card:hover {
        background: var(--accent-pale);
        border-color: rgba(212,98,42,0.3);
        color: var(--accent);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(212,98,42,0.15);
      }

      .deck-card:active { transform: translateY(0); }

      .deck-card.selected {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
        box-shadow: 0 4px 14px rgba(212,98,42,0.3);
      }

      /* ── Action bar ───────────────────────────────────────── */
      .action-bar {
        position: relative;
        z-index: 1;
        display: flex;
        gap: 10px;
        margin-bottom: 28px;
        flex-wrap: wrap;
      }

      /* ── Results ──────────────────────────────────────────── */
      .results-section {
        position: relative;
        z-index: 1;
        margin-bottom: 28px;
      }

      .results-summary {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px 20px;
        display: flex;
        align-items: center;
        gap: 16px;
        box-shadow: 0 1px 3px rgba(26,23,20,0.04);
      }

      .avg-label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-faint);
      }

      .avg-value {
        font-family: var(--mono);
        font-size: 28px;
        font-weight: 500;
        color: var(--accent);
        line-height: 1;
      }

      .avg-value.hidden-state {
        font-size: 13px;
        font-family: var(--sans);
        color: var(--ink-faint);
        font-weight: 400;
      }

      /* ── History ──────────────────────────────────────────── */
      .history-section {
        position: relative;
        z-index: 1;
      }

      .history-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 10px;
      }

      .history-item {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 16px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .history-story {
        font-size: 14px;
        font-weight: 600;
        color: var(--ink);
      }

      .history-meta {
        font-size: 12px;
        color: var(--ink-faint);
      }

      .history-votes {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--ink-muted);
        margin-top: 2px;
      }

      /* ── Debug ────────────────────────────────────────────── */
      #debug {
        position: relative;
        z-index: 1;
        font-family: var(--mono);
        font-size: 11px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 24px;
        color: var(--ink-muted);
        white-space: pre;
      }

      /* ── Responsive ───────────────────────────────────────── */
      @media (max-width: 600px) {
        #participants { grid-template-columns: repeat(3, 1fr); }
        .deck-card { width: 44px; font-size: 13px; }
        .topbar { flex-direction: column; align-items: flex-start; }
      }
    </style>
  </head>
  <body>
    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-left">
        <a href="/" class="room-brand">
          <div class="pip-icon">♠</div>
        </a>
        <span id="roomcode">Room</span>
        <span id="status"></span>
      </div>

      <!-- Story bar inline in header on wide screens -->
      <div class="story-bar" style="flex:1;margin-bottom:0">
        <span class="story-label">Story</span>
        <span id="story"></span>
        <span id="story-controls">
          <button id="edit-story" class="btn btn-ghost" title="Edit story" style="padding:4px 8px;font-size:13px">✎ Edit</button>
          <button id="save-story" class="btn btn-primary" hidden style="padding:6px 12px;font-size:13px">Save</button>
        </span>
      </div>
    </header>

    <!-- Participants -->
    <div class="section-label" style="position:relative;z-index:1;margin-bottom:10px">Participants</div>
    <section id="participants"></section>

    <!-- Voting deck -->
    <div class="deck-section">
      <div class="section-label">Cast your vote</div>
      <div id="deck"></div>
    </div>

    <!-- Actions -->
    <div class="action-bar" id="actions"></div>

    <!-- Results -->
    <div class="results-section">
      <div class="section-label">Results</div>
      <div class="results-summary">
        <div>
          <div class="avg-label">Average</div>
          <div class="avg-value" id="results-summary">—</div>
        </div>
      </div>
    </div>

    <!-- History -->
    <div class="history-section">
      <div class="section-label">Round history</div>
      <div class="history-list" id="history"></div>
    </div>

    <!-- Debug (hidden by default, shown with ?debug=1) -->
    <pre id="debug">debug</pre>

    <script src="/static/app.js"></script>

    <div id="story-modal" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(26,23,20,0.4);backdrop-filter:blur(4px);align-items:center;justify-content:center">
      <div class="card" style="width:100%;max-width:420px;margin:24px">
        <div style="font-family:var(--serif);font-size:22px;margin-bottom:16px">New round</div>
        <label class="field-label" for="modal-story-input">Story label</label>
        <div class="input-wrap">
          <span class="input-icon">✦</span>
          <input type="text" id="modal-story-input" placeholder="e.g. USER-342 — Add dark mode" autocomplete="off" />
        </div>
        <div style="display:flex;gap:8px;margin-top:20px">
          <button id="modal-confirm" class="btn btn-primary btn-full">Start round →</button>
          <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
        </div>
      </div>
    </div>
  </body>
</html>
